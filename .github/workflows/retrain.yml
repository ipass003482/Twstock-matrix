name: Weekly ML Retrain

on:
  schedule:
    # Every Monday 22:00 UTC = Tuesday 06:00 Taiwan time
    # (Monday TWN morning the market data isn't fresh yet, so we use prior week + Monday's close)
    # If you want Monday TWN morning instead, use '0 22 * * 0' (Sunday 22:00 UTC = Monday 06:00 TWN)
    - cron: '0 22 * * 0'
  workflow_dispatch:  # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scikit-learn requests

      - name: Run training (with walk-forward backtest)
        working-directory: ml
        run: python train_model.py

      - name: Move weights to project root
        run: mv ml/ml_weights.json ml_weights.json

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet ml_weights.json; then
            echo "No changes in ml_weights.json"
          else
            git add ml_weights.json
            git commit -m "chore(ml): weekly auto-retrain $(date -u +%Y-%m-%d)"
            git push
          fi
